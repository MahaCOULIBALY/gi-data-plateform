# ============================================================
# GLOSSAIRE MÉTIER
# ============================================================
glossary:
  - term: "CA Net HT"
    definition: "Chiffre d'affaires net hors taxes = factures (type F) - avoirs (type A)"
    owner: "Direction Financière"

  - term: "Taux de Placement"
    definition: "Intérimaires en mission / total intérimaires disponibles par agence"
    owner: "Direction Opérations"

  - term: "Taux de Transformation"
    definition: "Commandes pourvues / commandes totales reçues par agence"
    owner: "Direction Opérations"

  - term: "Taux de Marge"
    definition: "(CA mission - coût paye) / CA mission"
    owner: "Direction Financière"

  - term: "Risque Churn"
    definition: "Score 0→1 basé sur inactivité (30%), fréquence (25%), delta CA QoQ (25%), delta CA YoY (20%)"
    owner: "Direction Commerciale"

  - term: "NIR Pseudonymisé"
    definition: "SHA256(NIR + RGPD_SALT)[:16] — NIR brut jamais stocké hors Bronze"
    owner: "CDO / Data Team"
    classification: "RGPD"

  - term: "SCD Type 2"
    definition: "Slowly Changing Dimension — historisation par valid_from/valid_to/is_current"
    owner: "Data Team"

  - term: "Score Global Agence"
    definition: "Composite pondéré : CA (35%) + Marge (25%) + Placement (25%) + Transformation (15%)"
    owner: "Direction Réseau"
