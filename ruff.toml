target-version = "py311"
line-length = 120

[lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "SIM", "T20"]
ignore = ["E501"]  # Line length handled by formatter

[lint.per-file-ignores]
"dags/*.py" = ["T20"]  # Allow print in DAGs for Airflow logging

[format]
quote-style = "double"
indent-style = "space"
