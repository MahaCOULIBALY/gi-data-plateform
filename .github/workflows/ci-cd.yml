# .github/workflows/ci-cd.yml — GI Data Lakehouse Pipeline
# Lint + Test + dbt + Deploy K8s
name: GI Data Lakehouse CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'scripts/**'
      - 'dags/**'
      - 'dbt/**'
      - 'quality/**'
      - 'tests/**'
      - 'Dockerfile'
      - 'requirements.txt'
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: '3.11'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/gi-pipeline

jobs:
  # ──────────────────────────────────────────
  # 1. Lint & Type Check
  # ──────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install lint tools
        run: pip install ruff mypy

      - name: Ruff lint
        run: ruff check scripts/ dags/ quality/ --config ruff.toml

      - name: Ruff format check
        run: ruff format --check scripts/ dags/ quality/

      - name: MyPy type check
        run: mypy scripts/shared.py --ignore-missing-imports --no-error-summary
        continue-on-error: true  # Phase initiale : warnings only

      - name: Script size check (< 200 lines)
        run: |
          echo "Checking Manifeste v2.0: all scripts < 200 lines..."
          FAILED=0
          for f in scripts/*.py; do
            LINES=$(wc -l < "$f")
            if [ "$LINES" -gt 200 ]; then
              echo "❌ FAIL: $f has $LINES lines (max 200)"
              FAILED=1
            else
              echo "✅ OK: $f ($LINES lines)"
            fi
          done
          if [ "$FAILED" -eq 1 ]; then exit 1; fi

  # ──────────────────────────────────────────
  # 2. Unit Tests
  # ──────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: gi_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports: ['5432:5432']
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run unit tests
        env:
          PG_HOST: localhost
          PG_PORT: 5432
          PG_USER: test
          PG_PASSWORD: test
          PG_DATABASE: gi_test
          RGPD_SALT: test_salt_for_ci_only_32chars!!
          # Dummy values — tests use mocks for Evolia/S3
          EVOLIA_SERVER: localhost
          EVOLIA_DB: test
          EVOLIA_USER: test
          EVOLIA_PASSWORD: test
          OVH_S3_ENDPOINT: http://localhost:9000
          OVH_S3_ACCESS_KEY: test
          OVH_S3_SECRET_KEY: test
          DRY_RUN: "1"
        run: |
          pytest tests/ -v --tb=short --cov=scripts --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ──────────────────────────────────────────
  # 3. dbt Tests
  # ──────────────────────────────────────────
  dbt:
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: gi_dbt_test
          POSTGRES_USER: dbt
          POSTGRES_PASSWORD: dbt
        ports: ['5432:5432']
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dbt
        run: pip install dbt-postgres==1.7.*

      - name: Create schemas
        env:
          PGHOST: localhost
          PGUSER: dbt
          PGPASSWORD: dbt
          PGDATABASE: gi_dbt_test
        run: |
          for schema in slv_facturation slv_missions slv_temps slv_clients slv_interimaires slv_agences \
                        gld_shared gld_commercial gld_performance gld_staffing gld_clients gld_operationnel stg; do
            psql -c "CREATE SCHEMA IF NOT EXISTS $schema;"
          done

      - name: dbt deps + compile
        working-directory: dbt
        env:
          DBT_USER: dbt
          DBT_PASSWORD: dbt
          PG_HOST: localhost
          PG_PORT: 5432
          PG_DATABASE: gi_dbt_test
        run: |
          dbt deps 2>/dev/null || true
          dbt compile --target dev

      - name: dbt test (schema validation only)
        working-directory: dbt
        env:
          DBT_USER: dbt
          DBT_PASSWORD: dbt
          PG_HOST: localhost
          PG_PORT: 5432
          PG_DATABASE: gi_dbt_test
        run: dbt test --target dev 2>/dev/null || echo "⚠️ dbt tests require populated source tables"
        continue-on-error: true  # CI: compile check only, full test in staging

  # ──────────────────────────────────────────
  # 4. Build & Push Docker Image
  # ──────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: [test, dbt]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  # ──────────────────────────────────────────
  # 5. Deploy to K8s (OVHcloud MKS)
  # ──────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_PROD }}" | base64 -d > ~/.kube/config

      - name: Update image in CronJobs
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          for manifest in k8s/cronjobs/*.yaml; do
            kubectl set image -f "$manifest" pipeline="$IMAGE" --local -o yaml | kubectl apply -f -
          done

      - name: Update Airflow DAGs
        run: |
          # Sync DAGs to Airflow DAG bucket (OVH Object Storage)
          pip install awscli
          aws s3 sync dags/ s3://gi-airflow-dags/ \
            --endpoint-url "${{ secrets.OVH_S3_ENDPOINT }}" \
            --delete

      - name: Verify rollout
        run: |
          kubectl get cronjobs -n data-pipeline
          echo "✅ Deployment complete: ${{ github.sha }}"

      - name: Notify Slack
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: "GI Pipeline deploy: ${{ job.status }} (${{ github.sha }})"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
